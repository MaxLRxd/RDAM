version: '3.8'

services:

  # ============================================
  # BASE DE DATOS — MySQL 8
  # ============================================
  mysql:
    image: mysql:8.0
    container_name: rdam-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: rdam_db
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    # Healthcheck: Spring Boot esperará hasta que MySQL
    # esté listo para aceptar conexiones antes de arrancar.
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost",
             "-u", "root", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rdam-network

  # ============================================
  # REDIS — Tokens efímeros
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: rdam-redis
    ports:
      - "6379:6379"
    # Sin contraseña en desarrollo local.
    # En producción agregar: --requirepass ${REDIS_PASSWORD}
    command: redis-server
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rdam-network

  # ============================================
  # MINIO — Almacenamiento de certificados PDF
  # ============================================
  minio:
    image: minio/minio:latest
    container_name: rdam-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    ports:
      - "9000:9000"   # API S3
      - "9001:9001"   # Consola web → http://localhost:9001
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rdam-network

  # ============================================
  # MAILHOG — Servidor SMTP falso para desarrollo
  # Captura todos los emails y los muestra en una UI web.
  # Ver emails enviados en: http://localhost:8025
  # ============================================
  mailhog:
    image: mailhog/mailhog:latest
    container_name: rdam-mailhog
    ports:
      - "1025:1025"   # Puerto SMTP (Spring Mail apunta acá)
      - "8025:8025"   # UI web para ver los emails
    networks:
      - rdam-network

  # ============================================
  # BACKEND — Spring Boot (RDAM)
  # Se construye a partir del Dockerfile local.
  # ============================================
  backend:
    build: .
    container_name: rdam-backend
    ports:
      - "8080:8080"
    environment:
      # Servidor
      SERVER_BASE_URL: http://backend:8080
      SERVER_PUBLIC_URL: http://localhost:8080
      # Base de datos — usa el nombre de servicio "mysql" como host
      DB_URL: jdbc:mysql://mysql:3306/rdam_db?useUnicode=true&characterEncoding=UTF-8&serverTimezone=America/Argentina/Buenos_Aires&allowPublicKeyRetrieval=true&useSSL=false
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      # Redis — usa el nombre de servicio "redis" como host
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ""
      # MinIO — usa el nombre de servicio "minio" como host
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET_NAME: rdam-certificados
      # Mail — apunta a MailHog (SMTP falso, ver emails en http://localhost:8025)
      SMTP_HOST: mailhog
      SMTP_PORT: 1025
      SMTP_USERNAME: ""
      SMTP_PASSWORD: ""
      SMTP_AUTH: "false"
      SMTP_STARTTLS: "false"
      MAIL_FROM: rdam@local.dev
      # JWT
      JWT_SECRET: ${JWT_SECRET}
      # PlusPagos mock — usa el nombre de servicio "pluspagos-mock" como host
      PLUSPAGOS_API_URL: http://pluspagos-mock:3000
      PLUSPAGOS_PUBLIC_URL: http://localhost:3000
      PLUSPAGOS_HMAC_SECRET: ${PLUSPAGOS_HMAC_SECRET}
      PLUSPAGOS_MERCHANT_GUID: ${PLUSPAGOS_MERCHANT_GUID}
      PLUSPAGOS_SECRET_KEY: ${PLUSPAGOS_SECRET_KEY}
      PAYMENT_MODE: sim
      SIM_AUTO_APPROVE: "false"
      # Reglas de negocio
      VENCIMIENTO_PENDIENTE_DIAS: "1"
      VALIDEZ_CERTIFICADO_DIAS: "2"
      MONTO_ARANCEL: "1500.00"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      pluspagos-mock:
        condition: service_started
    networks:
      - rdam-network

  # ============================================
  # PLUSPAGOS MOCK — Simulador de pasarela de pagos
  # Los archivos server.js y crypto.js que subiste.
  # ============================================
  pluspagos-mock:
    image: node:18-alpine
    container_name: rdam-pluspagos-mock
    working_dir: /app
    # Copia los archivos del mock desde tu máquina al contenedor.
    # Ajustá la ruta si tus archivos están en otro lugar.
    volumes:
      - ./pluspagos-mock:/app
    command: sh -c "npm install && node server.js"
    ports:
      - "3000:3000"
    networks:
      - rdam-network

# ============================================
# VOLÚMENES — Persisten los datos entre reinicios
# ============================================
volumes:
  mysql_data:
  minio_data:

# ============================================
# RED — Todos los servicios se ven entre sí
# por nombre de contenedor (ej: "rdam-mysql")
# ============================================
networks:
  rdam-network:
    driver: bridge