# ============================================================
# SISTEMA RDAM — application.properties
# ============================================================


# ------------------------------------------------------------
# SERVIDOR
# ------------------------------------------------------------
server.port=8080
server.servlet.context-path=/api/v1
server.base-url=${SERVER_BASE_URL}


# ------------------------------------------------------------
# BASE DE DATOS
# ------------------------------------------------------------
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000


# ------------------------------------------------------------
# JPA / HIBERNATE
# ------------------------------------------------------------
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true


# ------------------------------------------------------------
# FLYWAY
# ------------------------------------------------------------
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true


# ------------------------------------------------------------
# REDIS
# ------------------------------------------------------------
spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT}
spring.data.redis.password=${REDIS_PASSWORD}
spring.data.redis.timeout=2000ms


# ------------------------------------------------------------
# MINIO
# ------------------------------------------------------------
minio.endpoint=${MINIO_ENDPOINT}
minio.access-key=${MINIO_ACCESS_KEY}
minio.secret-key=${MINIO_SECRET_KEY}
minio.bucket-name=${MINIO_BUCKET_NAME}


# ------------------------------------------------------------
# MAIL
# ------------------------------------------------------------
spring.mail.host=${SMTP_HOST}
spring.mail.port=${SMTP_PORT}
spring.mail.username=${SMTP_USERNAME}
spring.mail.password=${SMTP_PASSWORD}
spring.mail.properties.mail.smtp.auth=${SMTP_AUTH}
spring.mail.properties.mail.smtp.starttls.enable=${SMTP_STARTTLS}

rdam.mail.from=${MAIL_FROM}


# ------------------------------------------------------------
# JWT
# ------------------------------------------------------------
rdam.jwt.secret=${JWT_SECRET}
rdam.jwt.expiration-ms=28800000


# ------------------------------------------------------------
# PAGOS
# ------------------------------------------------------------
rdam.payment.mode=${PAYMENT_MODE}
rdam.payment.hmac-secret=${PLUSPAGOS_HMAC_SECRET}
rdam.payment.merchant-guid=${PLUSPAGOS_MERCHANT_GUID}
rdam.payment.secret-key=${PLUSPAGOS_SECRET_KEY}
rdam.payment.api-url=${PLUSPAGOS_API_URL:http://localhost:3000}
rdam.payment.public-url=${PLUSPAGOS_PUBLIC_URL:http://localhost:3000}
rdam.payment.sim-auto-approve=${SIM_AUTO_APPROVE}


# ------------------------------------------------------------
# REGLAS DE NEGOCIO
# ------------------------------------------------------------
rdam.negocio.vencimiento-pendiente-dias=${VENCIMIENTO_PENDIENTE_DIAS}
rdam.negocio.validez-certificado-dias=${VALIDEZ_CERTIFICADO_DIAS}
rdam.negocio.max-upload-size-bytes=10485760
rdam.negocio.monto-arancel=${MONTO_ARANCEL}


# ------------------------------------------------------------
# UPLOAD
# ------------------------------------------------------------
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB


# ------------------------------------------------------------
# RATE LIMITING
# ------------------------------------------------------------
rdam.security.rate-limit-por-minuto=10


# ------------------------------------------------------------
# SCHEDULER
# ------------------------------------------------------------
rdam.scheduler.vencimiento-cron=0 0 2 * * *


# ------------------------------------------------------------
# LOGGING
# ------------------------------------------------------------
logging.level.root=INFO
logging.level.com.rdam.backend=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.flywaydb=INFO
logging.pattern.console=%d{HH:mm:ss} [%-5level] %logger{30} - %msg%n
