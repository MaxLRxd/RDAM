# nginx.conf — Configuración de producción para el frontend RDAM.
#
# Responsabilidades:
#   1. Servir los archivos estáticos de React desde /usr/share/nginx/html
#   2. Proxy inverso: /api/* → http://backend:8080  (Spring Boot context-path=/api/v1)
#   3. Proxy inverso: /sim/* → http://backend:8080  (simulador de pago PlusPagos mock)
#   4. SPA fallback: cualquier ruta desconocida → index.html
#      (para hash routing esto es redundante, pero es buena práctica)
#   4. Cache inteligente: index.html nunca se cachea; los assets con hash
#      (main.xxxxx.js) se cachean durante 1 año.
#   5. Compresión gzip de texto.
#
# ─── ¿Por qué nginx en lugar de solo "servir el dist/"? ────────────────────
# En Docker, el build de Vite produce archivos estáticos. Necesitamos un
# servidor HTTP que:
#   a) Sirva esos archivos de forma eficiente.
#   b) Actúe como proxy inverso hacia el backend para /api/*.
#      Sin esto, el navegador haría la llamada a localhost:8080 directamente,
#      lo que requeriría habilitar CORS en el backend —innecesario y menos seguro.
#   c) Resuelva el hostname "backend" a través de la red Docker interna.
#      El navegador nunca ve "backend:8080"; solo ve su propio origen (puerto 80).

events {
    # Número máximo de conexiones simultáneas por worker.
    # 1024 es suficiente para un entorno de desarrollo/staging.
    worker_connections 1024;
}

http {
    # Tipos MIME — incluye los tipos estándar de nginx
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Transferencia eficiente de archivos (evita copias user-space/kernel-space)
    sendfile on;

    # ── Compresión gzip ──────────────────────────────────────────────────────
    # Reduce el tamaño del JS/CSS transferido al navegador.
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;          # No comprimir respuestas pequeñas
    gzip_proxied    any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # ── Timeouts del proxy ───────────────────────────────────────────────────
    # El upload de certificados PDF (POST /certificado) puede tardar
    # algunos segundos si el archivo es grande. Aumentamos el timeout.
    proxy_connect_timeout  10s;
    proxy_send_timeout     60s;
    proxy_read_timeout     60s;

    server {
        listen 80;
        server_name _;       # Acepta cualquier hostname (entorno de desarrollo)

        root /usr/share/nginx/html;
        index index.html;

        # ── Proxy inverso hacia el backend ───────────────────────────────────
        # Todas las rutas que empiezan con /api/ se reenvían al backend.
        # El path completo se preserva: /api/v1/solicitudes → backend:8080/api/v1/solicitudes
        #
        # "backend" es el nombre del servicio en docker-compose.yml.
        # Docker resuelve este hostname dentro de la red rdam-network.
        location /api/ {
            proxy_pass         http://backend:8080;

            # Headers estándar de proxy inverso
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # Deshabilitar el buffering para respuestas de streaming
            # (no aplica en este backend, pero es buena práctica)
            proxy_buffering off;

            # Tamaño máximo del cuerpo de la petición: 15 MB
            # Necesario para el upload de certificados PDF (máx. 10 MB en UI,
            # más margen para headers multipart).
            client_max_body_size 15m;
        }

        # ── Proxy: simulador de pago PlusPagos (solo modo simulación) ──────────
        # El backend expone /sim/** como controlador interno de Spring Boot
        # (ver SecurityConfig: .requestMatchers("/sim/**").permitAll()).
        # Cuando el ciudadano hace "Pagar", el frontend auto-submite un form
        # hacia urlPago = http://localhost/sim/pago/{id}, que debe llegar al backend.
        #
        # Sin esta regla, nginx no encontraría /sim/ en el dist/ estático y
        # devolvería index.html (SPA fallback), causando "Cannot POST /sim/...".
        location /sim/ {
            proxy_pass         http://backend:8080;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # ── Archivos estáticos con hash en el nombre ─────────────────────────
        # Vite genera nombres como: main.4a8f92b1.js, vendor.a3c2d1e0.css
        # Estos archivos cambian de nombre cuando el contenido cambia,
        # así que se pueden cachear indefinidamente (1 año = 31536000 s).
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            try_files $uri =404;
        }

        # ── SPA fallback ──────────────────────────────────────────────────────
        # Cualquier ruta que no sea un archivo estático ni /api/* devuelve
        # index.html. Esto permite que React maneje el routing del lado del
        # cliente (hash routing en este proyecto).
        #
        # Con hash routing (#/ciudadano, #/interno), el servidor NUNCA recibe
        # la parte del hash — el navegador la maneja localmente. Por eso esto
        # es redundante, pero protege contra navegaciones directas a rutas
        # no-hash en el futuro.
        location / {
            # index.html nunca debe cachearse: contiene los nombres de los
            # chunks con hash, y si se cachea el viejo, el usuario no verá
            # la nueva versión aunque los assets ya hayan cambiado.
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            try_files $uri $uri/ /index.html;
        }
    }
}
